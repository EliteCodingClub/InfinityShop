<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Infinity Admin Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
  <main class="admin-shell">
    <section id="admin-login" class="login-panel">
      <div class="login-card">
        <span class="brand-mark">Infinity</span>
        <h1>Admin Portal</h1>
        <p>Owner access for orders, products, stock, and delivery status.</p>
        <form id="admin-login-form">
          <label>Email</label>
          <input id="admin-email" type="email" required autocomplete="email">
          <label>Password</label>
          <input id="admin-password" type="password" required autocomplete="current-password">
          <div id="admin-login-error" class="alert alert--error" hidden></div>
          <button type="submit">Sign In</button>
        </form>
      </div>
    </section>

    <section id="admin-app" class="admin-app" hidden>
      <aside class="sidebar">
        <a class="sidebar__brand" href="../index.html">
          <span>Infinity</span>
          <small>Liquor Admin</small>
        </a>
        <nav>
          <button class="nav-btn nav-btn--active" data-view="dashboard">Dashboard</button>
          <button class="nav-btn" data-view="orders">Orders</button>
          <button class="nav-btn" data-view="products">Products</button>
          <button class="nav-btn" data-view="settings">Settings</button>
        </nav>
        <button id="admin-logout" class="sidebar__logout">Sign Out</button>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <h2 id="view-title">Dashboard</h2>
            <p id="admin-user-line">Signed in</p>
          </div>
          <button id="refresh-admin" class="secondary-btn">Refresh</button>
        </header>

        <div id="admin-alert" class="alert" hidden></div>

        <section id="view-dashboard" class="view view--active">
          <div class="metrics">
            <article><span id="metric-pending">0</span><small>Pending Orders</small></article>
            <article><span id="metric-today">$0.00</span><small>Today Revenue</small></article>
            <article><span id="metric-low-stock">0</span><small>Low Stock</small></article>
            <article><span id="metric-products">0</span><small>Active Products</small></article>
          </div>
          <div class="panel">
            <div class="panel__head">
              <h3>Latest Orders</h3>
            </div>
            <div id="latest-orders" class="table-wrap"></div>
          </div>
        </section>

        <section id="view-orders" class="view">
          <div class="panel">
            <div class="panel__head">
              <h3>Orders</h3>
              <select id="order-status-filter">
                <option value="all">All statuses</option>
                <option value="pending">Pending</option>
                <option value="accepted">Accepted</option>
                <option value="preparing">Preparing</option>
                <option value="dispatched">Dispatched</option>
                <option value="delivered">Delivered</option>
                <option value="cancelled">Cancelled</option>
              </select>
            </div>
            <div id="orders-table" class="table-wrap"></div>
          </div>
        </section>

        <section id="view-products" class="view">
          <div class="grid-2">
            <form id="product-form" class="panel form-panel">
              <div class="panel__head">
                <h3>Add Product</h3>
              </div>
              <input type="hidden" id="product-id">
              <label>Name</label>
              <input id="product-name" required>
              <label>Category</label>
              <select id="product-category" required></select>
              <label>Description</label>
              <textarea id="product-description" rows="3"></textarea>
              <div class="row">
                <div>
                  <label>Brand</label>
                  <input id="product-brand">
                </div>
                <div>
                  <label>Volume ML</label>
                  <input id="product-volume" type="number" min="0">
                </div>
              </div>
              <div class="row">
                <div>
                  <label>Price</label>
                  <input id="product-price" type="number" min="0" step="0.01" required>
                </div>
                <div>
                  <label>Stock</label>
                  <input id="product-stock" type="number" min="0" step="1" required>
                </div>
              </div>
              <div class="row">
                <div>
                  <label>ABV %</label>
                  <input id="product-abv" type="number" min="0" step="0.01">
                </div>
                <div>
                  <label>Featured</label>
                  <select id="product-featured">
                    <option value="false">No</option>
                    <option value="true">Yes</option>
                  </select>
                </div>
              </div>
              <label>Image</label>
              <input id="product-image" type="file" accept="image/png,image/jpeg,image/webp">
              <label>Image URL</label>
              <input id="product-image-url" placeholder="Auto-filled after upload or paste URL">
              <button type="submit">Save Product</button>
              <button type="button" id="reset-product-form" class="secondary-btn">Clear</button>
            </form>

            <div class="panel">
              <div class="panel__head">
                <h3>Inventory</h3>
              </div>
              <div id="products-table" class="table-wrap"></div>
            </div>
          </div>
        </section>

        <section id="view-settings" class="view">
          <form id="settings-form" class="panel form-panel narrow">
            <div class="panel__head">
              <h3>Shop Settings</h3>
            </div>
            <label>Shop Name</label>
            <input id="setting-shop-name">
            <label>Phone</label>
            <input id="setting-phone">
            <label>Email</label>
            <input id="setting-email" type="email">
            <label>Address</label>
            <input id="setting-address">
            <div class="row">
              <div>
                <label>Latitude</label>
                <input id="setting-lat" type="number" step="0.000001">
              </div>
              <div>
                <label>Longitude</label>
                <input id="setting-lng" type="number" step="0.000001">
              </div>
            </div>
            <div class="row">
              <div>
                <label>Radius KM</label>
                <input id="setting-radius" type="number" min="1" step="0.1">
              </div>
              <div>
                <label>COD Fee</label>
                <input id="setting-cod" type="number" min="0" step="0.01">
              </div>
            </div>
            <label>Store Open</label>
            <select id="setting-open">
              <option value="true">Open</option>
              <option value="false">Closed</option>
            </select>
            <button type="submit">Save Settings</button>
          </form>
        </section>
      </section>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
